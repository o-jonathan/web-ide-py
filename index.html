<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Document</title>
</head>

<body>
    <div id="loading">
        Loading...
        <div class="loader"></div>
    </div>

    <div class="toolbar">

        <div class="container">
            <div class="title">
                main.py
            </div>

            <div class="select-container">
                <label for="f-size"><i class="bi bi-search"></i></label>
                <select name="f-size" id="f-size" class="select">
                    <option value="16px">100%</option>
                    <option value="20px">125%</option>
                    <option value="24px">150%</option>
                    <option value="32px">200%</option>
                </select>
            </div>
        </div>

        <div class="container">
            <button class="secondary btn" onclick="addText('\t')">
                Tab
                <i class="bi bi-chevron-bar-right"></i>
            </button>

            <button class="btn" onclick="runCode()">
                Run
                <i class="bi bi-play-fill"></i>
            </button>
        </div>
    </div>

    <div class="workspace">
        <div id="editor"></div>

        <div class="console">
            <div class="console-header">
                OUTPUT

                <button class="secondary btn" onclick="copyCode()">
                    Copy
                    <i class="bi bi-clipboard-fill"></i>
                </button>
            </div>

            <pre id="output"></pre>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.28.3/full/pyodide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@latest/min/vs/loader.js"></script>
    <script src="./script.js"></script>
</body>

</html>
