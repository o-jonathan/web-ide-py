<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css?v=6.1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    <title>Web Python IDE</title>
</head>

<body>
    <div id="loading">
        Loading...
        <div class="loader"></div>
    </div>

    <div class="toolbar">

        <div class="container">
            <div class="title" onclick="document.getElementById('name').focus()">
                <i class="bi bi-pencil-fill"></i>
                <input type="text" id="name" value="main.py">
            </div>

            <!-- <div class="select-container">
                <label for="f-size"><i class="bi bi-search"></i></label>
                <select name="f-size" id="f-size" class="select">
                    <option value="08px">50%</option>
                    <option value="12px">75%</option>
                    <option value="16px" selected>100%</option>
                    <option value="20px">125%</option>
                    <option value="24px">150%</option>
                    <option value="32px">200%</option>
                </select>
            </div> -->
        </div>

        <div class="container">
            <!-- <label for="impf" class="secondary btn input-file">
                <input type="file" name="impf" id="impf" accept=".txt,.py" onchange="validateFile(this)">
                Import
                <i class="bi bi-cloud-arrow-up-fill"></i>
            </label>

            <button class="secondary btn" onclick="clearEditor()">
                Clear
                <i class="bi bi-file-earmark-excel-fill"></i>
            </button> -->

            <button class="btn" onclick="runCode()">
                Run
                <i class="bi bi-play-fill"></i>
            </button>

            <button class="secondary btn" onclick="openMenu()">
                <i class="bi bi-three-dots-vertical"></i>
            </button>
        </div>
    </div>

    <div class="workspace">
        <div id="editor"></div>

        <div class="console">
            <div class="console-header">
                <div class="container">
                    OUTPUT
                </div>

                <div class="container">
                    <button class="secondary btn" onclick="copyOutput()">
                        Copy
                        <i class="bi bi-clipboard-fill"></i>
                    </button>
                    <button class="secondary btn" onclick="expandOutput()">
                        <i class="bi bi-arrows-angle-expand"></i>
                    </button>
                    <!-- <button class="secondary btn" onclick="download('test.txt', 'hello world')">
                        Save
                        <i class="bi bi-file-earmark-arrow-down-fill"></i>
                    </button> -->
                </div>
            </div>

            <pre class="output" id="output"></pre>
        </div>
    </div>

    <div class="hotbar secondary">
        <div class="dpad">
            <button class="sm-btn" onclick="addText('    ')">
                <i class="bi bi-chevron-bar-right"></i>
            </button>
            <div class="row">
                <button class="sm-btn" id="sel-l" onpointerdown="startMove(true, 'l')" onpointerup="stopMove()"
                    onpointercancel="stopMove()">
                    <i class="bi bi-caret-left-square-fill"></i>
                </button>

                <button class="sm-btn" id="sel-r" onclick="selAll()"><i class="bi bi-square-fill"></i></button>

                <button class="sm-btn" id="sel-r" onpointerdown="startMove(true, 'r')" onpointerup="stopMove()"
                    onpointercancel="stopMove()">
                    <i class="bi bi-caret-right-square-fill"></i>
                </button>
            </div>
        </div>

        <div class="dpad">
            <button class="sm-btn" id="up" onpointerdown="startMove(false, 'u')" onpointerup="stopMove()"
                onpointercancel="stopMove()">
                <i class="bi bi-caret-up-fill"></i>
            </button>

            <div class="row">
                <button class="sm-btn" id="left" onpointerdown="startMove(false, 'l')" onpointerup="stopMove()"
                    onpointercancel="stopMove()">
                    <i class="bi bi-caret-left-fill"></i>
                </button>
                <button class="sm-btn" id="down" onpointerdown="startMove(false, 'd')" onpointerup="stopMove()"
                    onpointercancel="stopMove()">
                    <i class="bi bi-caret-down-fill"></i>
                </button>
                <button class="sm-btn" id="right" onpointerdown="startMove(false, 'r')" onpointerup="stopMove()"
                    onpointercancel="stopMove()">
                    <i class="bi bi-caret-right-fill"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="dial-bg" id="menu" onclick="closeMenu()">
        <div class="dial" onclick="event.stopPropagation()">
            <div class="dial-top">
                <div class="select-container">
                    <label for="f-size"><i class="bi bi-search"></i></label>
                    <select name="f-size" id="f-size" class="select">
                        <option value="08px">50%</option>
                        <option value="12px">75%</option>
                        <option value="16px" selected>100%</option>
                        <option value="20px">125%</option>
                        <option value="24px">150%</option>
                        <option value="32px">200%</option>
                    </select>
                </div>
                <button class="btn-err btn" onclick="closeMenu()"><i class="bi bi-x-lg"></i></button>
            </div>

            <label for="impf" class="secondary dial-btn btn input-file">
                <input type="file" name="impf" id="impf" accept=".txt,.py" onchange="validateFile(this)">
                Import
                <i class="bi bi-cloud-arrow-up-fill"></i>
            </label>

            <button class="secondary dial-btn btn" onclick="clearEditor()">
                Clear
                <i class="bi bi-file-earmark-excel-fill"></i>
            </button>

            <button class="secondary dial-btn btn" onclick="download('test.txt', 'hello world')">
                Save
                <i class="bi bi-file-earmark-arrow-down-fill"></i>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.28.3/full/pyodide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@latest/min/vs/loader.js"></script>
    <script src="./script.js?v=6.1"></script>
</body>

</html>
